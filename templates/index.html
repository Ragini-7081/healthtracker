<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Health Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
           
           
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero {
            text-align: center;
            color: white;
            padding: 60px 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 500px;
            width: 90%;
        }
        .hero h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .hero p { font-size: 1.1rem; opacity: 0.85; margin-bottom: 40px; }
        .btn-group { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 14px 36px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .btn-primary { background: white; color: #764ba2; }
        .btn-outline { background: transparent; color: white; border: 2px solid white; }
        .features {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .feature { text-align: center; opacity: 0.9; }
        .feature span { font-size: 2rem; display: block; }
        .feature p { font-size: 0.85rem; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>🏃 HealthTrack</h1>
        <p>Your personal health & habit companion</p>
        <div class="btn-group">
            <a href="/login" class="btn btn-primary">Login</a>
            <a href="/register" class="btn btn-outline">Register</a>
        </div>
        <div class="features">
            <div class="feature"><span>📊</span><p>Analytics</p></div>
            <div class="feature"><span>✅</span><p>Habits</p></div>
            <div class="feature"><span>💧</span><p>Hydration</p></div>
            <div class="feature"><span>😴</span><p>Sleep</p></div>
        </div>
    </div>
</body>
</html>
