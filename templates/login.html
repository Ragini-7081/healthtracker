<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HealthTrack</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        h2 { text-align: center; color: #764ba2; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 0.9rem; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; color: #555; font-size: 0.9rem; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #764ba2; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2); 
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn:hover { opacity: 0.9; }
        .footer-text { text-align: center; margin-top: 20px; color: #888; font-size: 0.9rem; }
        .footer-text a { color: #764ba2; text-decoration: none; font-weight: 500; }
        .back { text-align: center; margin-bottom: 20px; }
        .back a { color: #764ba2; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="back"><a href="/">← Back to Home</a></div>
        <h2>Welcome Back 👋</h2>
        <p class="subtitle">Login to your health dashboard</p>

        <form method="POST" action="/login">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>

        <p class="footer-text">Don't have an account? <a href="/register">Register here</a></p>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            const email = this.querySelector('[name="email"]');
            const password = this.querySelector('[name="password"]');
            if (!email.value.includes('@') || password.value.length < 1) {
                e.preventDefault();
                alert('Please fill in all fields correctly.');
            }
        });
    </script>
</body>
</html>
